name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
      - 'template-sources/**'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Which variant to build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# Cancel older in-flight runs on the same ref to save minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          # setup-gradle handles its own dependency cache by default.
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build APK
        env:
          GRADLE_OPTS: "-Xmx3g -Dorg.gradle.daemon=false"
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            gradle assembleRelease --no-daemon --stacktrace --warning-mode none
          else
            gradle assembleDebug --no-daemon --stacktrace --warning-mode none
          fi

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK was produced."
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK_PATH" .apk)" >> "$GITHUB_OUTPUT"
          ls -lh "$APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports
            app/build/outputs/logs
          if-no-files-found: ignore
          retention-days: 7
